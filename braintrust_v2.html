<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BrainTrust - API Powered</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; display: flex; justify-content: center; padding: 20px; }
        #game-container { background: #16213e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 600px; text-align: center; }
        .hidden { display: none; }
        button { background: #e94560; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; margin: 10px; font-weight: bold; }
        .option-btn { display: block; width: 100%; background: #0f3460; text-align: left; margin: 10px 0; padding: 12px; border: 1px solid #533483; color: white; border-radius: 8px; }
        .correct { background: #27ae60 !important; }
        .wrong { background: #c0392b !important; }
        #stats { display: flex; justify-content: space-between; margin-bottom: 20px; color: #00d2ff; font-weight: bold; }
        .loading-text { color: #f39c12; font-style: italic; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="setup-screen">
        <h1 style="color: #00d2ff;">BrainTrust</h1>
        <input type="text" id="username" placeholder="Enter Name" style="padding: 10px; width: 80%; margin-bottom: 20px; border-radius: 5px;">
        
        <p><strong>1. Choose Category:</strong></p>
        <button onclick="setCategory(9, 'General Knowledge')">General Knowledge</button>
        <button onclick="setCategory(18, 'Science & Computers')">Science/Tech</button>
        <button onclick="setCategory(21, 'Sports')">Sports (NFL/Cricket)</button>
        <button onclick="setCategory(23, 'History')">History</button>
        <p id="cat-label">Selected: None</p>

        <p><strong>2. Choose Duration:</strong></p>
        <button onclick="startGame(1)">1 Min</button>
        <button onclick="startGame(5)">5 Mins</button>
        <button onclick="startGame(10)">10 Mins</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="stats">
            <span>⏱️ <span id="timer">0:00</span></span>
            <span>🏆 <span id="score">0</span></span>
        </div>
        <h3 id="question-text">Fetching fresh questions...</h3>
        <div id="options-container"></div>
        <p id="feedback" style="font-weight: bold; height: 20px;"></p>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="final-msg"></h2>
        <p id="score-report"></p>
        <button onclick="location.reload()">New Game</button>
    </div>
</div>

<script>
    let currentPool = [], sessionUsed = [], score = 0, timeLeft = 0, timerInterval;
    let selectedCatID = null;
    const FIFTEEN_DAYS = 15 * 24 * 60 * 60 * 1000;

    // Helper to decode HTML entities like &quot;
    function decodeHtml(html) {
        let txt = document.createElement("textarea");
        txt.innerHTML = html;
        return txt.value;
    }

    function setCategory(id, label) {
        selectedCatID = id;
        document.getElementById('cat-label').innerText = "Selected: " + label;
    }

    async function fetchQuestions() {
        const url = `https://opentdb.com{selectedCatID}&type=multiple`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            
            const user = document.getElementById('username').value || "Seeker";
            const history = JSON.parse(localStorage.getItem(`qHist_${user}`) || "{}");
            const now = Date.now();

            // Filter out questions answered in the last 15 days based on their Question Text (since API IDs change)
            currentPool = data.results.filter(q => {
                const lastSeen = history[q.question] || 0;
                return (now - lastSeen > FIFTEEN_DAYS);
            });

            // If the filter empties the pool, just use the fresh batch
            if (currentPool.length === 0) currentPool = data.results;
            
            nextQuestion();
        } catch (e) {
            document.getElementById('question-text').innerText = "Error connecting to Trivia API.";
        }
    }

    function startGame(mins) {
        if (!selectedCatID) return alert("Pick a category!");
        timeLeft = mins * 60;
        score = 0;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        
        startTimer();
        fetchQuestions(); // Load from API
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function nextQuestion() {
        if (currentPool.length === 0) {
            fetchQuestions(); // Refill pool if empty
            return;
        }

        const qData = currentPool.shift();
        const user = document.getElementById('username').value || "Seeker";
        
        // Log to 15-day history
        let history = JSON.parse(localStorage.getItem(`qHist_${user}`) || "{}");
        history[qData.question] = Date.now();
        localStorage.setItem(`qHist_${user}`, JSON.stringify(history));

        render(qData);
    }

    function render(q) {
        document.getElementById('question-text').innerText = decodeHtml(q.question);
        document.getElementById('feedback').innerText = "";
        const container = document.getElementById('options-container');
        container.innerHTML = "";

        const options = [...q.incorrect_answers, q.correct_answer].sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = decodeHtml(opt);
            btn.onclick = () => {
                const all = document.querySelectorAll('.option-btn');
                all.forEach(b => b.disabled = true);
                
                if (opt === q.correct_answer) {
                    btn.classList.add('correct');
                    score += 10;
                    document.getElementById('feedback').innerText = "Great job! 🔥";
                } else {
                    btn.classList.add('wrong');
                    document.getElementById('feedback').innerText = "Correct answer: " + decodeHtml(q.correct_answer);
                }
                document.getElementById('score').innerText = score;
                setTimeout(nextQuestion, 1500);
            };
            container.appendChild(btn);
        });
    }

    function endGame() {
        clearInterval(timerInterval);
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-msg').innerText = score > 40 ? "Amazing Performance!" : "Good Try!";
        document.getElementById('score-report').innerText = `Your score: ${score}`;
    }
</script>
</body>
</html>
