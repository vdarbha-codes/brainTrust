<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BrainGym - Instant Access</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; display: flex; justify-content: center; padding: 20px; }
        #game-container { background: #16213e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 600px; text-align: center; }
        .hidden { display: none; }
        button { background: #e94560; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; margin: 8px; font-weight: bold; transition: 0.2s; }
        button:disabled { background: #444; cursor: not-allowed; }
        .option-btn { display: block; width: 100%; background: #0f3460; text-align: left; margin: 10px 0; padding: 15px; border: 1px solid #533483; color: white; border-radius: 8px; font-size: 1.1em; }
        .correct { background: #27ae60 !important; }
        .wrong { background: #c0392b !important; }
        #loading-bar-container { width: 100%; background: #0f3460; height: 10px; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        #loading-bar { width: 0%; height: 100%; background: #00d2ff; transition: width 0.5s; }
        #stats { display: flex; justify-content: space-between; margin-bottom: 20px; color: #00d2ff; font-weight: bold; font-family: monospace; font-size: 1.4em; border-bottom: 2px solid #533483; padding-bottom: 10px; }
        input { padding: 12px; width: 80%; margin-bottom: 20px; border-radius: 8px; border: none; background: #0f3460; color: white; text-align: center; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="setup-screen">
        <h1 style="color: #00d2ff;">BrainGym</h1>
        <div id="loader-area">
            <p id="load-msg">Warming up the gym equipment...</p>
            <div id="loading-bar-container"><div id="loading-bar"></div></div>
        </div>
        
        <div id="main-menu" class="hidden">
            <input type="text" id="username" placeholder="Enter Name">
            <p><strong>Select Your Workout:</strong></p>
            <button onclick="setCategory('math', 'Daily Math')">🔢 Daily Math</button>
            <button onclick="setCategory(9, 'General Knowledge')">🌍 GK</button>
            <button onclick="setCategory(20, 'Mythology')">🏺 Mythology</button>
            <button onclick="setCategory(18, 'Science')">🧪 Science</button>
            <button onclick="setCategory(21, 'Sports')">🏅 Sports</button>
            <button onclick="setCategory(11, 'Movies')">🎬 Movies</button>
            <p id="cat-label" style="color: #f39c12; font-weight: bold; margin-top: 10px;">Selected: None</p>
            <button id="start-btn" onclick="startGame(1)">1 Min</button>
            <button id="start-btn-5" onclick="startGame(5)">5 Mins</button>
            <button id="start-btn-10" onclick="startGame(10)">10 Mins</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div id="stats">
            <span>⏱️ <span id="timer">0:00</span></span>
            <span>🔥 <span id="streak">0</span></span>
            <span>🏆 <span id="score">0</span></span>
        </div>
        <h3 id="question-text"></h3>
        <div id="options-container"></div>
        <div id="feedback-area" style="min-height: 40px; margin-top: 15px; color: #f39c12; font-weight: bold;"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 style="color: #00d2ff;">Workout Complete!</h2>
        <p id="score-report" style="font-size: 1.8em; margin: 20px 0; font-weight: bold;"></p>
        <p id="encouragement" style="font-style: italic; color: #7f8c8d;"></p>
        <button onclick="location.reload()">Reset Gym</button>
    </div>
</div>

<script>
    let categoryCaches = {}; 
    let currentPool = [], score = 0, streak = 0, timeLeft = 0, timerInterval, currentUser = "";
    let selectedCatID = null;
    const FIFTEEN_DAYS = 15 * 24 * 60 * 60 * 1000;
    const categoriesToLoad = [
        {id: 9, name: 'GK'}, {id: 20, name: 'Mythology'}, 
        {id: 18, name: 'Science'}, {id: 21, name: 'Sports'}, {id: 11, name: 'Movies'}
    ];

    function decode(html) {
        let txt = document.createElement("textarea");
        txt.innerHTML = html;
        return txt.value;
    }

    async function preQueryAll() {
        const bar = document.getElementById('loading-bar');
        const msg = document.getElementById('load-msg');
        
        for (let i = 0; i < categoriesToLoad.length; i++) {
            const cat = categoriesToLoad[i];
            msg.innerText = `Loading ${cat.name} questions...`;
            
            try {
                const res = await fetch(`https://opentdb.com{cat.id}&difficulty=easy&type=multiple`);
                const data = await res.json();
                categoryCaches[cat.id] = data.results;
                
                let progress = ((i + 1) / categoriesToLoad.length) * 100;
                bar.style.width = progress + "%";
                
                // Wait 5.1 seconds before next fetch to bypass rate limit
                if (i < categoriesToLoad.length - 1) await new Promise(r => setTimeout(r, 5100));
            } catch (e) {
                console.error(`Failed to load ${cat.name}`);
            }
        }
        
        document.getElementById('loader-area').classList.add('hidden');
        document.getElementById('main-menu').classList.remove('hidden');
    }

    function setCategory(id, label) {
        selectedCatID = id;
        document.getElementById('cat-label').innerText = "Selected: " + label;
    }

    function generateMath() {
        const a = Math.floor(Math.random() * 20) + 1;
        const b = Math.floor(Math.random() * 20) + 1;
        const ans = a + b;
        return {
            question: `What is ${a} + ${b}?`,
            correct_answer: ans.toString(),
            incorrect_answers: [(ans+2).toString(), (ans-1).toString(), (ans+5).toString()]
        };
    }

    function startGame(mins) {
        currentUser = document.getElementById('username').value.trim() || "GymMember";
        if (!selectedCatID) return alert("Select a workout!");
        
        score = 0; streak = 0; timeLeft = mins * 60;
        
        // Load pool from pre-queried cache
        const history = JSON.parse(localStorage.getItem(`bg_hist_${currentUser}`) || "{}");
        const now = Date.now();

        if (selectedCatID !== 'math') {
            currentPool = (categoryCaches[selectedCatID] || []).filter(q => {
                const lastSeen = history[q.question] || 0;
                return (now - lastSeen > FIFTEEN_DAYS);
            });
            if (currentPool.length === 0) currentPool = categoryCaches[selectedCatID];
        }

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        
        startTimer();
        renderNext();
    }

    function renderNext() {
        let q;
        if (selectedCatID === 'math') {
            q = generateMath();
        } else {
            if (currentPool.length === 0) return endGame("Workout Finished!");
            q = currentPool.shift();
            // Log to 15-day history
            let history = JSON.parse(localStorage.getItem(`bg_hist_${currentUser}`) || "{}");
            history[q.question] = Date.now();
            localStorage.setItem(`bg_hist_${currentUser}`, JSON.stringify(history));
        }
        display(q);
    }

    function display(q) {
        document.getElementById('question-text').innerText = decode(q.question);
        document.getElementById('feedback-area').innerText = "";
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        const opts = [...q.incorrect_answers, q.correct_answer].sort(() => Math.random() - 0.5);

        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = decode(opt);
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                if (opt === q.correct_answer) {
                    btn.classList.add('correct'); score += 10; streak++;
                    document.getElementById('feedback-area').innerText = "🔥 Correct!";
                } else {
                    btn.classList.add('wrong'); streak = 0;
                    document.getElementById('feedback-area').innerText = "💡 Answer: " + decode(q.correct_answer);
                }
                document.getElementById('score').innerText = score;
                document.getElementById('streak').innerText = streak;
                setTimeout(renderNext, 1200);
            };
            container.appendChild(btn);
        });
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function endGame(msg) {
        clearInterval(timerInterval);
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('score-report').innerText = `Total Score: ${score}`;
        document.getElementById('encouragement').innerText = "Consistency is the key to a sharp mind. See you tomorrow!";
    }

    window.onload = () => {
        const last = localStorage.getItem('bg_last_user');
        if(last) document.getElementById('username').value = last;
        preQueryAll();
    };
</script>
</body>
</html>
