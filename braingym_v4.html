<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BrainGym - Offline First</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; display: flex; justify-content: center; padding: 20px; }
        #game-container { background: #16213e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 600px; text-align: center; }
        .hidden { display: none; }
        button { background: #e94560; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; margin: 8px; font-weight: bold; transition: 0.2s; }
        .option-btn { display: block; width: 100%; background: #0f3460; text-align: left; margin: 10px 0; padding: 15px; border: 1px solid #533483; color: white; border-radius: 8px; }
        .correct { background: #27ae60 !important; }
        .wrong { background: #c0392b !important; }
        #stats { display: flex; justify-content: space-between; margin-bottom: 20px; color: #00d2ff; font-weight: bold; font-family: monospace; font-size: 1.4em; border-bottom: 2px solid #533483; padding-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="setup-screen">
        <h1 style="color: #00d2ff;">BrainGym</h1>
        <input type="text" id="username" placeholder="Enter Name" style="padding: 12px; width: 80%; margin-bottom: 20px; border-radius: 8px; border: none;">
        <p><strong>Select Workout:</strong></p>
        <button onclick="setCategory(9, 'GK')">🌍 GK</button>
        <button onclick="setCategory(20, 'Mythology')">🏺 Mythology</button>
        <button onclick="setCategory(18, 'Science')">🧪 Science</button>
        <button onclick="setCategory(21, 'Sports')">🏅 Sports</button>
        <button onclick="setCategory(11, 'Movies')">🎬 Movies</button>
        <p id="cat-label" style="color: #f39c12; font-weight: bold;">Selected: None</p>
        <button onclick="startGame(1)">1 Min</button>
        <button onclick="startGame(5)">5 Mins</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="stats">
            <span>⏱️ <span id="timer">0:00</span></span>
            <span>🏆 <span id="score">0</span></span>
        </div>
        <h3 id="question-text"></h3>
        <div id="options-container"></div>
        <p id="feedback" style="min-height: 30px; color: #f39c12; font-weight: bold;"></p>
    </div>
</div>

<script>
    let localBank = {}, currentPool = [], score = 0, timeLeft = 0, timerInterval, currentUser = "";
    let selectedCatID = null;
    const FIFTEEN_DAYS = 15 * 24 * 60 * 60 * 1000;

    function decode(html) {
        let txt = document.createElement("textarea");
        txt.innerHTML = html;
        return txt.value;
    }

    // Load Local Questions First
    async function init() {
        try {
            const res = await fetch('questions.json');
            localBank = await res.json();
            console.log("Local questions loaded as primary source.");
        } catch (e) { console.error("questions.json missing. Game requires local file."); }
    }

    function setCategory(id, label) {
        selectedCatID = id;
        document.getElementById('cat-label').innerText = "Selected: " + label;
    }

    async function restockFromAPI(id) {
        console.log("Pool low. Attempting to restock from API...");
        try {
            const res = await fetch(`https://opentdb.com{id}&difficulty=easy&type=multiple`);
            const data = await res.json();
            if (data.results && data.results.length > 0) {
                currentPool = [...currentPool, ...data.results];
                console.log("API restock successful.");
            }
        } catch (e) { console.warn("API unavailable. Continuing with local bank."); }
    }

    function startGame(mins) {
        currentUser = document.getElementById('username').value.trim() || "GymMember";
        if (!selectedCatID) return alert("Select a category!");
        
        // Load the 50 local questions for that category
        currentPool = [...(localBank[selectedCatID] || [])];
        
        // Apply 15-Day Filter
        const history = JSON.parse(localStorage.getItem(`bg_hist_${currentUser}`) || "{}");
        const now = Date.now();
        currentPool = currentPool.filter(q => (now - (history[q.question] || 0) > FIFTEEN_DAYS));

        score = 0; timeLeft = mins * 60;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        
        tick();
        renderNext();
    }

    function tick() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                location.reload();
            }
        }, 1000);
    }

    function renderNext() {
        // If pool is running low (< 5 questions), try to fetch more in background
        if (currentPool.length < 5 && selectedCatID) {
            restockFromAPI(selectedCatID);
        }

        if (currentPool.length === 0) {
            document.getElementById('question-text').innerText = "Session complete! Out of questions.";
            return;
        }

        const q = currentPool.shift();
        
        // Log to 15-day history
        let history = JSON.parse(localStorage.getItem(`bg_hist_${currentUser}`) || "{}");
        history[q.question] = Date.now();
        localStorage.setItem(`bg_hist_${currentUser}`, JSON.stringify(history));

        display(q);
    }

    function display(q) {
        document.getElementById('question-text').innerText = decode(q.question);
        document.getElementById('feedback').innerText = "";
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        const opts = [...q.incorrect_answers, q.correct_answer].sort(() => Math.random() - 0.5);

        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = decode(opt);
            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
                if (opt === q.correct_answer) {
                    btn.classList.add('correct'); score += 10;
                    document.getElementById('feedback').innerText = "Correct! ✨";
                } else {
                    btn.classList.add('wrong');
                    document.getElementById('feedback').innerText = "Wrong! Answer: " + decode(q.correct_answer);
                }
                document.getElementById('score').innerText = score;
                setTimeout(renderNext, 1500);
            };
            container.appendChild(btn);
        });
    }

    window.onload = init;
</script>
</body>
</html>
