<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BrainGym - Daily Mental Fitness</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; display: flex; justify-content: center; padding: 20px; }
        #game-container { background: #16213e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 600px; text-align: center; }
        .hidden { display: none; }
        button { background: #e94560; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; margin: 8px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #ff4d6d; transform: scale(1.05); }
        .option-btn { display: block; width: 100%; background: #0f3460; text-align: left; margin: 10px 0; padding: 15px; border: 1px solid #533483; color: white; border-radius: 8px; font-size: 1.1em; cursor: pointer; }
        .correct { background: #27ae60 !important; border-color: #2ecc71 !important; }
        .wrong { background: #c0392b !important; border-color: #e74c3c !important; }
        #stats { display: flex; justify-content: space-between; margin-bottom: 20px; color: #00d2ff; font-weight: bold; font-family: monospace; font-size: 1.4em; border-bottom: 2px solid #533483; padding-bottom: 10px; }
        #feedback-area { font-weight: bold; min-height: 40px; margin-top: 15px; color: #f39c12; font-size: 1.1em; }
        input { padding: 12px; width: 80%; margin-bottom: 20px; border-radius: 8px; border: none; background: #0f3460; color: white; text-align: center; font-size: 1em; }
        .streak-fire { color: #f39c12; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="setup-screen">
        <h1 style="color: #00d2ff; margin-bottom: 5px;">BrainGym</h1>
        <p style="color: #7f8c8d; margin-bottom: 25px;">Level Up Your Intelligence</p>
        
        <input type="text" id="username" placeholder="Enter Your Name">
        
        <p><strong>1. Select Your Workout:</strong></p>
        <button onclick="setCategory('math', 'Daily Math')">🔢 Daily Math</button>
        <button onclick="setCategory(9, 'General Knowledge')">🌍 General Knowledge</button>
        <button onclick="setCategory(20, 'Mythology')">🏺 Mythology</button>
        <button onclick="setCategory(18, 'Science')">🧪 Science</button>
        <button onclick="setCategory(21, 'Sports')">🏅 Sports</button>
        <button onclick="setCategory(11, 'Movies')">🎬 Movies</button>
        <p id="cat-label" style="color: #f39c12; font-weight: bold; margin-top: 10px;">Selected: None</p>

        <p><strong>2. Select Duration:</strong></p>
        <button onclick="startGame(1)">1 Min</button>
        <button onclick="startGame(5)">5 Mins</button>
        <button onclick="startGame(10)">10 Mins</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="stats">
            <span>⏱️ <span id="timer">0:00</span></span>
            <span class="streak-fire">🔥 <span id="streak">0</span></span>
            <span>🏆 <span id="score">0</span></span>
        </div>
        <h3 id="question-text">Initializing Training...</h3>
        <div id="options-container"></div>
        <div id="feedback-area"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="final-msg" style="color: #00d2ff;">Workout Complete!</h2>
        <p id="score-report" style="font-size: 1.8em; margin: 20px 0; font-weight: bold;"></p>
        <p id="encouragement" style="font-style: italic; color: #7f8c8d; padding: 0 20px; line-height: 1.5;"></p>
        <button onclick="location.reload()">New Workout</button>
    </div>
</div>

<script>
    let currentPool = [], score = 0, streak = 0, timeLeft = 0, timerInterval, currentUser = "";
    let selectedCatID = null;
    const FIFTEEN_DAYS = 15 * 24 * 60 * 60 * 1000;

    function decode(html) {
        let txt = document.createElement("textarea");
        txt.innerHTML = html;
        return txt.value;
    }

    function setCategory(id, label) {
        selectedCatID = id;
        document.getElementById('cat-label').innerText = "Selected: " + label;
    }

    function generateMath() {
        const ops = ['+', '-', '*'];
        const op = ops[Math.floor(Math.random() * ops.size)]; // Wait, fix sizing
        const a = Math.floor(Math.random() * 20) + 1;
        const b = Math.floor(Math.random() * 20) + 1;
        let qText, ans;

        if (Math.random() > 0.3) {
            ans = a + b;
            qText = `What is ${a} + ${b}?`;
        } else if (Math.random() > 0.5) {
            ans = Math.max(a,b) - Math.min(a,b);
            qText = `What is ${Math.max(a,b)} - ${Math.min(a,b)}?`;
        } else {
            ans = Math.floor(Math.random() * 12) * Math.floor(Math.random() * 12);
            let n1 = Math.floor(Math.sqrt(ans)) || 2;
            let n2 = Math.floor(ans / n1);
            ans = n1 * n2;
            qText = `What is ${n1} × ${n2}?`;
        }

        const options = new Set([ans]);
        while(options.size < 4) {
            options.add(ans + (Math.floor(Math.random() * 10) - 5));
        }
        
        return {
            question: qText,
            correct_answer: ans.toString(),
            incorrect_answers: Array.from(options).filter(x => x != ans).map(x => x.toString())
        };
    }

    async function fetchQuestions() {
        if (selectedCatID === 'math') {
            renderNext();
            return;
        }

        const url = `https://opentdb.com{selectedCatID}&difficulty=easy&type=multiple`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            const history = JSON.parse(localStorage.getItem(`bg_hist_${currentUser}`) || "{}");
            const now = Date.now();

            currentPool = data.results.filter(q => {
                const lastSeen = history[q.question] || 0;
                return (now - lastSeen > FIFTEEN_DAYS);
            });

            if (currentPool.length === 0) currentPool = data.results;
            renderNext();
        } catch (e) {
            document.getElementById('question-text').innerText = "Connection lost. Refresh to reconnect.";
        }
    }

    function startGame(mins) {
        currentUser = document.getElementById('username').value.trim() || "GymMember";
        localStorage.setItem('bg_last_user', currentUser);
        if (!selectedCatID) return alert("Pick a category to begin!");
        
        score = 0; streak = 0;
        timeLeft = mins * 60;
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        
        startTimer();
        fetchQuestions();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function renderNext() {
        let q;
        if (selectedCatID === 'math') {
            q = generateMath();
        } else {
            if (currentPool.length === 0) { fetchQuestions(); return; }
            q = currentPool.shift();
            let history = JSON.parse(localStorage.getItem(`bg_hist_${currentUser}`) || "{}");
            history[q.question] = Date.now();
            localStorage.setItem(`bg_hist_${currentUser}`, JSON.stringify(history));
        }
        display(q);
    }

    function display(q) {
        document.getElementById('question-text').innerText = decode(q.question);
        document.getElementById('feedback-area').innerText = "";
        const container = document.getElementById('options-container');
        container.innerHTML = "";

        const options = [...q.incorrect_answers, q.correct_answer].sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = decode(opt);
            btn.onclick = () => {
                const all = document.querySelectorAll('.option-btn');
                all.forEach(b => b.disabled = true);
                
                if (opt === q.correct_answer) {
                    btn.classList.add('correct');
                    score += 10; streak++;
                    document.getElementById('feedback-area').innerText = "🔥 Correct! Quick thinking.";
                } else {
                    btn.classList.add('wrong');
                    streak = 0;
                    document.getElementById('feedback-area').innerText = "💡 The answer was: " + decode(q.correct_answer);
                }
                document.getElementById('score').innerText = score;
                document.getElementById('streak').innerText = streak;
                setTimeout(renderNext, 1200);
            };
            container.appendChild(btn);
        });
    }

    function endGame() {
        clearInterval(timerInterval);
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        const gymQuotes = [
            "Your neurons are firing at 100%! Great session.",
            "Consistently training your brain is the key to longevity.",
            "Knowledge is a muscle. Excellent workout today!",
            "Great focus! You're becoming a powerhouse of information."
        ];
        
        document.getElementById('score-report').innerText = `Total Score: ${score}`;
        document.getElementById('encouragement').innerText = gymQuotes[Math.floor(Math.random() * gymQuotes.length)];
    }

    window.onload = () => {
        const last = localStorage.getItem('bg_last_user');
        if(last) document.getElementById('username').value = last;
    };
</script>
</body>
</html>
