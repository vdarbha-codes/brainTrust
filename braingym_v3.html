<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainGym - Mental Fitness</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #game-container { background: #16213e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 600px; text-align: center; min-height: 500px; }
        .hidden { display: none; }
        button { background: #e94560; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; margin: 8px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #ff4d6d; transform: scale(1.05); }
        .option-btn { display: block; width: 100%; background: #0f3460; text-align: left; margin: 10px 0; padding: 15px; border: 1px solid #533483; color: white; border-radius: 8px; font-size: 1.1em; }
        .correct { background: #27ae60 !important; border-color: #2ecc71 !important; }
        .wrong { background: #c0392b !important; border-color: #e74c3c !important; }
        #loading-bar-container { width: 100%; background: #0f3460; height: 12px; border-radius: 6px; margin: 20px 0; overflow: hidden; border: 1px solid #533483; }
        #loading-bar { width: 0%; height: 100%; background: #00d2ff; transition: width 0.4s ease; }
        #stats { display: flex; justify-content: space-between; margin-bottom: 20px; color: #00d2ff; font-weight: bold; font-family: monospace; font-size: 1.4em; border-bottom: 2px solid #533483; padding-bottom: 10px; }
        input { padding: 12px; width: 80%; margin-bottom: 20px; border-radius: 8px; border: none; background: #0f3460; color: white; text-align: center; font-size: 1em; }
        #funny-gym-media { width: 100%; max-height: 250px; border-radius: 10px; margin-bottom: 15px; object-fit: contain; background: #000; }
        #load-msg { color: #f39c12; font-style: italic; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Bootloader Screen with Funny Media -->
    <div id="loader-screen">
        <h1 style="color: #00d2ff;">BrainGym</h1>
        <img id="funny-gym-media" src="https://media.giphy.com" alt="Funny Gym Moment">
        <p id="load-msg">Warming up your brain cells...</p>
        <div id="loading-bar-container"><div id="loading-bar"></div></div>
        <p style="font-size: 0.8em; color: #7f8c8d;">Please wait while we stock the library (~25s)...</p>
    </div>

    <!-- Rest of the Screens (Setup, Game, Result) remain the same -->
    <div id="setup-screen" class="hidden">
        <h1 style="color: #00d2ff; margin-bottom: 5px;">BrainGym</h1>
        <p style="color: #7f8c8d; margin-bottom: 25px;">Ready for your mental workout?</p>
        <input type="text" id="username" placeholder="Enter Player Name">
        <p><strong>Select Category:</strong></p>
        <div id="category-buttons">
            <button onclick="setCat('math', 'Daily Math')">🔢 Daily Math</button>
            <button onclick="setCat(9, 'General Knowledge')">🌍 GK</button>
            <button onclick="setCat(20, 'Mythology')">🏺 Mythology</button>
            <button onclick="setCat(18, 'Science')">🧪 Science</button>
            <button onclick="setCat(21, 'Sports')">🏅 Sports</button>
            <button onclick="setCat(11, 'Movies')">🎬 Movies</button>
        </div>
        <p id="cat-label" style="color: #f39c12; font-weight: bold; margin-top: 10px;">Selected: None</p>
        <button onclick="startGame(1)">1 Min</button>
        <button onclick="startGame(5)">5 Mins</button>
        <button onclick="startGame(10)">10 Mins</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="stats">
            <span>⏱️ <span id="timer">0:00</span></span>
            <span>🔥 <span id="streak">0</span></span>
            <span>🏆 <span id="score">0</span></span>
        </div>
        <h3 id="question-text"></h3>
        <div id="options-container"></div>
        <div id="feedback-area" style="min-height: 40px; margin-top: 15px; color: #f39c12; font-weight: bold;"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 style="color: #00d2ff;">Workout Complete!</h2>
        <p id="score-report" style="font-size: 1.8em; margin: 20px 0; font-weight: bold;"></p>
        <p id="encouragement" style="font-style: italic; color: #7f8c8d; padding: 0 20px;"></p>
        <button onclick="location.reload()">Back to Lobby</button>
    </div>
</div>

<script>
    // Funny Gym Media Pool
    const funnyMedia = [
        "https://media.giphy.com", // Cat on bike
        "https://media.giphy.com", // Gym fail
        "https://media.giphy.com", // Dog gym
        "https://media.giphy.com" // Penguin lifting
    ];

    // Same Logic as previous version with Media cycling added to preQueryAll
    let categoryCaches = {}; 
    let currentPool = [], score = 0, streak = 0, timeLeft = 0, timerInterval, currentUser = "";
    let selectedCatID = null;
    const FIFTEEN_DAYS = 15 * 24 * 60 * 60 * 1000;
    const categoriesToLoad = [
        {id: 9, name: 'General Knowledge'}, {id: 20, name: 'Mythology'}, 
        {id: 18, name: 'Science'}, {id: 21, name: 'Sports'}, {id: 11, name: 'Movies'}
    ];

    function decode(html) {
        let txt = document.createElement("textarea");
        txt.innerHTML = html;
        return txt.value;
    }

    async function preQueryAll() {
        const bar = document.getElementById('loading-bar');
        const msg = document.getElementById('load-msg');
        const img = document.getElementById('funny-gym-media');
        
        for (let i = 0; i < categoriesToLoad.length; i++) {
            const cat = categoriesToLoad[i];
            msg.innerText = `Adding weights to ${cat.name}...`;
            
            // Cycle funny media every category load
            img.src = funnyMedia[i % funnyMedia.length];
            
            try {
                const res = await fetch(`https://opentdb.com{cat.id}&difficulty=easy&type=multiple`);
                const data = await res.json();
                
                if (data.response_code === 5) {
                    msg.innerText = "Gym busy... taking a quick break.";
                    await new Promise(r => setTimeout(r, 5000));
                    i--; continue;
                }

                categoryCaches[cat.id] = data.results;
                let progress = ((i + 1) / categoriesToLoad.length) * 100;
                bar.style.width = progress + "%";
                
                if (i < categoriesToLoad.length - 1) await new Promise(r => setTimeout(r, 5100));
            } catch (e) {
                msg.innerText = "Network glitch! Spotting the server...";
                await new Promise(r => setTimeout(r, 3000));
                i--; 
            }
        }
        
        msg.innerText = "Workout Library Ready!";
        setTimeout(() => {
            document.getElementById('loader-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
        }, 1000);
    }

    // [Rest of the Game Logic: startGame, renderNext, display, startTimer, endGame, generateMath]
    // ... Copy the game functions from the previous version ...

    window.onload = () => {
        const last = localStorage.getItem('bg_last_user');
        if(last) document.getElementById('username').value = last;
        setTimeout(preQueryAll, 200); 
    };
</script>
</body>
</html>
